name: build-macos

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyinstaller

    - name: Build App
      run: |
        pyinstaller --noconfirm --onedir --windowed --name="小叙AI" "小叙AI.py"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 小叙AI-macOS
        path: dist/小叙AI.app
